# Nginx — Anilax Software (VPS)
# Place at: /etc/nginx/sites-available/anilax-software
# Replace YOUR_DOMAIN.com before use (vps-setup.sh does this automatically)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    root /var/www/anilax-software-design/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # React SPA — /admin, /blog/slug, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Node API (contact, admin, blog, Shree)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 2m;
}
